name: ci
on:
  push:
    branches: [main, dev-sync]
  pull_request:

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.11" }
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Root CLI tests
        run: npm install --package-lock=false && npm test && npm run prepublishOnly
      - name: Python syntax check
        run: python -m compileall backend kemory kemory_cli
      - name: Dashboard build
        working-directory: dashboard
        run: npm ci && npm run build
      - name: Compose config
        run: docker compose -f docker-compose.community.yml config >/dev/null
