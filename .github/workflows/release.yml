name: release
on:
  push:
    tags: ["v*.*.*"]

permissions:
  contents: read
  packages: write

jobs:
  publish-docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Login to GHCR
        run: echo "${{ github.token }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin
      - name: Build and push images
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          REPO="ghcr.io/$(echo "${GITHUB_REPOSITORY}" | tr '[:upper:]' '[:lower:]')"

          docker build -t "${REPO}-api:${VERSION}" -t "${REPO}-api:latest" .
          docker build -t "${REPO}-dashboard:${VERSION}" -t "${REPO}-dashboard:latest" ./dashboard

          docker push "${REPO}-api:${VERSION}"
          docker push "${REPO}-api:latest"
          docker push "${REPO}-dashboard:${VERSION}"
          docker push "${REPO}-dashboard:latest"

  publish-npm:
    needs: publish-docker
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: https://registry.npmjs.org
      - run: npm install --package-lock=false
      - run: npm test
      - run: npm run prepublishOnly
      - run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
