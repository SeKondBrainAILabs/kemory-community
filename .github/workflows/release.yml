name: release
on:
  push:
    tags: ["v*.*.*"]

permissions:
  contents: read
  packages: write

jobs:
  publish-docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Login to GHCR
        run: echo "${{ github.token }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin
      - name: Build and push images
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          REPO="ghcr.io/$(echo "${GITHUB_REPOSITORY}" | tr '[:upper:]' '[:lower:]')"

          docker build -t "${REPO}-api:${VERSION}" -t "${REPO}-api:latest" .
          docker build -t "${REPO}-dashboard:${VERSION}" -t "${REPO}-dashboard:latest" ./dashboard

          docker push "${REPO}-api:${VERSION}"
          docker push "${REPO}-api:latest"
          docker push "${REPO}-dashboard:${VERSION}"
          docker push "${REPO}-dashboard:latest"

  publish-npm:
    needs: publish-docker
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: https://registry.npmjs.org
      - id: npm-token
        name: Check npm token
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -n "${NODE_AUTH_TOKEN}" ]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "::notice::NPM_TOKEN is not configured; skipping npm publish. Publish manually after npm login."
          fi
      - run: npm install --package-lock=false
      - run: npm test
      - run: npm run prepublishOnly
      - if: steps.npm-token.outputs.available == 'true'
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
