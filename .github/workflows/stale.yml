name: stale
on:
  schedule:
    - cron: "0 1 * * *"

jobs:
  stale:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/stale@v9
        with:
          days-before-stale: 60
          days-before-close: 30
          stale-issue-message: "This issue has been quiet for 60 days. Closing in 30 days unless updated."
          stale-pr-message: "This PR has been quiet for 60 days. Closing in 30 days unless updated."
          close-issue-message: "Closed due to inactivity. Feel free to reopen if still relevant."
          close-pr-message: "Closed due to inactivity. Feel free to reopen with a rebase."
          exempt-issue-labels: "pinned,security,roadmap"
          exempt-pr-labels: "pinned,security"
