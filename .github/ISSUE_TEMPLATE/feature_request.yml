name: Feature request
description: Propose a new capability
labels: ["feature", "needs-triage"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What can't you do today, and why does it matter?
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
  - type: textarea
    id: who_benefits
    attributes:
      label: Who benefits
      description: Solo devs, small teams, enterprise, all of the above?
