server {
    listen 3000;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Docker internal DNS — needed for variable proxy_pass resolution
    resolver 127.0.0.11 valid=30s ipv6=off;

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # API proxy
    location /api/ {
        proxy_pass http://s9nmv-api:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Health proxy
    location /health/ {
        proxy_pass http://s9nmv-api:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # MCP proxy
    location /mcp/ {
        proxy_pass http://s9nmv-api:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Keycloak proxy — same-origin access to KC from the browser.
    # KC_HTTP_RELATIVE_PATH=/auth makes Keycloak serve under /auth/,
    # so we proxy the path as-is (no stripping).
    # Pass the original Host header so Keycloak generates correct issuer URLs.
    # Keycloak derives the port from the Host header automatically:
    #   - https://app.memory.dxb-gw.basanti.ai (no port → default 443)
    #   - http://10.0.0.158:3010 (Host includes :3010)
    #   - http://localhost:3010 (Host includes :3010)
    location /auth/ {
        # Use variable so nginx doesn't crash if s9nmv-keycloak is unavailable
        set $keycloak_upstream http://s9nmv-keycloak:8080;
        proxy_pass $keycloak_upstream;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
        proxy_set_header X-Forwarded-Host $http_host;
        proxy_buffer_size 128k;
        proxy_buffers 4 256k;
        proxy_busy_buffers_size 256k;
    }

    # Cache static assets
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
